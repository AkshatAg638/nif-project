# Production-Hardened Nginx Configuration for Namokriti International Foundation

# Rate Limiting Zone for APIs (Prevents DoS/Brute-force)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Connection Limiting Zone (Prevents DDoS)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─── 1. HTTP Server (Redirects all HTTP requests to HTTPS) ────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name namokriti.org www.namokriti.org;

    # Certbot renewal path (Let's Encrypt ACME challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── 2. HTTPS Server (Production Secure TLS Configuration) ───────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name namokriti.org www.namokriti.org;

    # SSL Certificates (Volume mounted from Let's Encrypt / Certbot host path)
    ssl_certificate /etc/letsencrypt/live/namokriti.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/namokriti.org/privkey.pem;

    # TLS Protocols & Ciphers (Modern Compatibility Profile - OWASP / Mozilla Recommended)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # SSL Session Settings (Performance Tuning)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Diffie-Hellman Parameter for Perfect Forward Secrecy (PFS)
    # Generate on host: openssl dhparam -out /etc/ssl/certs/dhparam.pem 2048
    ssl_dhparam /etc/ssl/certs/dhparam.pem;

    # OCSP Stapling (Enables verification of certificates by server to save client RTT)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/namokriti.org/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── 3. Strict Security Headers ───────────────────────────────────────────
    # HTTP Strict Transport Security (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Clickjacking Protection
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME Sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Cross-Site Scripting (XSS) Protection for Legacy Browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy (Strict privacy preservation)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy (Locks down hardware/browser features)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), payment=(self 'https://checkout.razorpay.com' 'https://js.stripe.com'), fullscreen=(self)" always;

    # Server Info Masking
    server_tokens off;

    # ─── 4. Client Request Body & Buffer Tuning (DoS mitigation) ──────────────
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # Timeouts
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 65s;
    send_timeout 10s;

    # Connection Limiting Enforcement
    limit_conn conn_limit 20;

    # ─── 5. Gzip Compression (Bandwidth savings) ──────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── 6. API Proxy Routing ──────────────────────────────────────────────────
    location /api/ {
        # Apply Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Forward request to backend container on port 5000
        proxy_pass http://backend:5000;
        
        # Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # IP and Protocol Forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy Timeout Safeguards
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffers 32 4k;
    }

    # ─── 7. Frontend Assets Routing ────────────────────────────────────────────
    # Standard SPA static serving (highly recommended for performance)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        
        # Optional: Uncomment if proxying to a frontend node process instead of serving build files
        # proxy_pass http://frontend:3000;
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection 'upgrade';
        # proxy_set_header Host $host;
        # proxy_cache_bypass $http_upgrade;
    }

    # Static assets cache control (Performance Optimization)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Custom Error Pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
