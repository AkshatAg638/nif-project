version: '3.8'

services:
  # ─── 1. Reverse Proxy (Nginx) ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nif-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount nginx production config (Read-Only)
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount SSL certs from Host (Let's Encrypt / Certbot path)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Webroot for certbot renewals
      - certbot-webroot:/var/www/certbot:ro
      # Mount frontend static build directory directly
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nif-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped

  # ─── 2. Backend Application (Node.js/Express) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nif-backend
    # Internally expose 5000, DO NOT map ports to the host (isolated behind Nginx)
    expose:
      - "5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/namokriti
      - REDIS_URL=redis://redis:6379
      # Injected from host .env file
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - FRONTEND_URL=https://namokriti.org
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - nif-network
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

  # ─── 3. Database (MongoDB) ──────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: nif-mongodb
    # Removed ports mapping to Host for security. Accessible only via nif-network.
    volumes:
      - mongo-data:/data/db
    networks:
      - nif-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
        reservations:
          memory: 256M
    restart: unless-stopped

  # ─── 4. Cache & Session Store (Redis) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nif-redis
    # Removed ports mapping to Host for security. Accessible only via nif-network.
    volumes:
      - redis-data:/data
    networks:
      - nif-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
  certbot-webroot:

networks:
  nif-network:
    driver: bridge
