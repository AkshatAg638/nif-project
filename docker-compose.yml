version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/namokriti
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_key_namokriti_123!
      - NODE_ENV=production
    depends_on:
      - mongodb
      - redis
    networks:
      - nif-network

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - nif-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nif-network

volumes:
  mongo-data:
  redis-data:

networks:
  nif-network:
    driver: bridge
